name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"
  JOTUN_COVERAGE_MIN_LINES: "85.5"
  JOTUN_RUNTIME_CHAOS_CASES: "16"

permissions:
  contents: read

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install protoc + mold linker
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler mold clang
      - run: cargo clippy --all-targets -- -D warnings

  docs:
    name: rustdoc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install protoc + mold linker
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler mold clang
      - run: cargo doc --workspace --no-deps --all-features

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@5f57d6cb7cd20b14a8a27f522884c4bc8a187458 # v2.75.19
        with:
          tool: cargo-nextest
      - name: Install protoc + mold linker
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler mold clang
      - run: cargo nextest run --workspace --all-targets -E 'not binary(multi_node) and not binary(node) and not binary(tcp_transport)'
      - run: cargo test -p yggr --test node
      - run: cargo test -p yggr --test multi_node
      - run: cargo test -p yggr --test tcp_transport
      - run: cargo test --workspace --doc

  loom:
    name: loom
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install protoc + mold linker
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler mold clang
      - run: cargo test -p yggr --test loom_task_registry --release

  udeps:
    name: cargo-udeps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@5f57d6cb7cd20b14a8a27f522884c4bc8a187458 # v2.75.19
        with:
          tool: cargo-udeps
      - name: Install protoc + mold linker
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler mold clang
      - run: cargo +nightly udeps --workspace --all-targets

  runtime-chaos-nightly:
    name: runtime-chaos-nightly
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      JOTUN_RUNTIME_CHAOS_CASES: "128"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install protoc + mold linker
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler mold clang
      - run: cargo test -p yggr --test runtime_chaos chaos_seeds_preserve_safety

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@5f57d6cb7cd20b14a8a27f522884c4bc8a187458 # v2.75.19
        with:
          tool: cargo-llvm-cov,cargo-nextest
      - name: Install protoc + mold linker
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler mold clang
      - name: Enforce coverage floor
        run: cargo llvm-cov --workspace --all-targets --summary-only --fail-under-lines "$JOTUN_COVERAGE_MIN_LINES"
      - name: Export coverage reports
        if: always()
        run: |
          mkdir -p coverage
          # `cargo llvm-cov report --json` currently SIGBUSes on this
          # workspace's saved profile data; the main command is stable.
          cargo llvm-cov --workspace --all-targets --no-run --json --summary-only --output-path coverage/summary.json
          cargo llvm-cov report --lcov --output-path coverage/lcov.info
      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-reports
          path: coverage
          if-no-files-found: ignore
          retention-days: 14

  mutants-smoke:
    name: cargo-mutants-smoke
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@5f57d6cb7cd20b14a8a27f522884c4bc8a187458 # v2.75.19
        with:
          tool: cargo-mutants
      - name: Install protoc + mold linker
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler mold clang
      - name: Run diff-scoped mutant smoke
        # `--in-diff` takes a diff file, not a revspec. Materialise the
        # PR's changes to a patch file and point cargo-mutants at it.
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git diff "origin/${BASE_REF}...HEAD" > /tmp/pr.diff
          cargo mutants -p yggr-core -p yggr --in-diff /tmp/pr.diff --baseline skip --timeout 120 --output target/mutants/smoke
      - name: Upload cargo-mutants smoke report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cargo-mutants-smoke
          path: target/mutants/smoke
          if-no-files-found: ignore
          retention-days: 14

  mutants-nightly:
    name: cargo-mutants-nightly
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@5f57d6cb7cd20b14a8a27f522884c4bc8a187458 # v2.75.19
        with:
          tool: cargo-mutants
      - name: Install protoc + mold linker
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler mold clang
      - name: Run full cargo-mutants sweep
        run: cargo mutants -p yggr-core -p yggr --timeout 300 --output target/mutants/full
      - name: Upload cargo-mutants full report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cargo-mutants-full
          path: target/mutants/full
          if-no-files-found: ignore
          retention-days: 14

  core-proptests-nightly:
    name: core-proptests-nightly
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      JOTUN_CORE_INVARIANT_CASES: "1024"
      JOTUN_CORE_MONOTONIC_CASES: "4096"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: "cargo test -p yggr-core engine::tests::invariants::"

  kani:
    name: kani
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Run bounded proofs on yggr-core
        uses: model-checking/kani-github-action@f838096619a707b0f6b2118cf435eaccfa33e51f
        with:
          args: -p yggr-core --output-format=terse

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: EmbarkStudios/cargo-deny-action@91bf2b620e09e18d6eb78b92e7861937469acedb # v2.0.17

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  fuzz:
    name: fuzz-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      # cargo-fuzz requires nightly for the `-Z sanitizer` path.
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@5f57d6cb7cd20b14a8a27f522884c4bc8a187458 # v2.75.19
        with:
          tool: cargo-fuzz
      - name: Install protoc + mold linker
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler mold clang
      # 30 seconds per target is enough to catch panics and shallow
      # crashes on every PR. Nightly ensures the sanitizer runtime
      # cargo-fuzz needs is available.
      #
      # `--target x86_64-unknown-linux-gnu` is explicit: cargo-fuzz
      # defaults to musl on some hosts, which conflicts with the
      # sanitizer runtime (crt-static vs -Zsanitizer=address).
      - name: fuzz proto_message
        run: cd fuzz && cargo +nightly fuzz run --target x86_64-unknown-linux-gnu fuzz_proto_message -- -max_total_time=30
      - name: fuzz engine_events
        run: cd fuzz && cargo +nightly fuzz run --target x86_64-unknown-linux-gnu fuzz_engine_events -- -max_total_time=30
      - name: fuzz disk_storage_recover
        run: cd fuzz && cargo +nightly fuzz run --target x86_64-unknown-linux-gnu fuzz_disk_storage_recover -- -max_total_time=30
      # Keep any crashes the fuzzer finds as an artifact for triage.
      - name: Upload fuzz artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-artifacts
          path: fuzz/artifacts
          retention-days: 14

  fuzz-nightly:
    name: fuzz-nightly (${{ matrix.target }})
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_proto_message
          - fuzz_engine_events
          - fuzz_disk_storage_recover
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2 # nightly
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@5f57d6cb7cd20b14a8a27f522884c4bc8a187458 # v2.75.19
        with:
          tool: cargo-fuzz
      - name: Install protoc + mold linker
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler mold clang
      - name: Run nightly fuzz target
        run: cd fuzz && cargo +nightly fuzz run --target x86_64-unknown-linux-gnu ${{ matrix.target }} corpus/${{ matrix.target }} -- -max_total_time=300
      - name: Upload nightly fuzz artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-nightly-${{ matrix.target }}
          path: |
            fuzz/artifacts/${{ matrix.target }}
            fuzz/corpus/${{ matrix.target }}
          if-no-files-found: ignore
          retention-days: 14
