name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTDOCFLAGS: "-Dwarnings"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - uses: taiki-e/install-action@58e862542551f667fa44c8a2a4a1d64ad477c96a # v2.75.17
        with:
          tool: mdbook
      - name: Install protoc + mold linker
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler mold clang

      # Switch Pages source to "GitHub Actions" on first run. If the
      # repo still has "Deploy from a branch" set, this flips it —
      # removing the need to touch repo settings manually. Only runs
      # on push to main; PR builds just produce the artifact.
      - name: Configure Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
        with:
          enablement: true

      - name: Build rustdoc (workspace, no-deps)
        run: cargo doc --workspace --no-deps --all-features

      - name: Build mdBook
        run: cd book && mdbook build

      - name: Assemble site
        run: |
          mkdir -p target/site
          cp -r target/doc target/site/api
          cp -r book/book target/site/guide
          # Disable Jekyll so files starting with _ are served.
          touch target/site/.nojekyll
          # Landing page that redirects to the guide.
          cat > target/site/index.html <<'HTML'
          <!DOCTYPE html>
          <html lang="en"><head>
            <meta charset="utf-8">
            <title>jotun</title>
            <meta http-equiv="refresh" content="0; url=./guide/">
            <link rel="canonical" href="./guide/">
          </head><body>
            <p>Redirecting to <a href="./guide/">the guide</a>. Rustdoc is at <a href="./api/jotun/">api/jotun</a>.</p>
          </body></html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v4.0.0
        with:
          path: target/site

  deploy:
    name: deploy
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
