name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTDOCFLAGS: "-Dwarnings"

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    # configure-pages needs pages: write on push-to-main to flip
    # the Pages source. PR builds only read. Keep these job-scoped
    # so nothing else in the workflow gets write permissions.
    permissions:
      contents: read
      pages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@74e87cbfa15a59692b158178d8905a61bf6fca95 # v2.75.20
        with:
          tool: mdbook
      - name: Install protoc + mold linker
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler mold clang

      # Switch Pages source to "GitHub Actions" on first run. If the
      # repo still has "Deploy from a branch" set, this flips it —
      # removing the need to touch repo settings manually. Only runs
      # on push to main; PR builds just produce the artifact.
      - name: Configure Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          enablement: true

      - name: Build rustdoc (workspace, no-deps)
        run: cargo doc --workspace --no-deps --all-features

      - name: Build mdBook
        run: cd book && mdbook build

      - name: Assemble site
        run: |
          mkdir -p target/site
          cp -r target/doc target/site/api
          cp -r book/book target/site/guide
          # Disable Jekyll so files starting with _ are served.
          touch target/site/.nojekyll
          # Landing page that redirects to the guide.
          cat > target/site/index.html <<'HTML'
          <!DOCTYPE html>
          <html lang="en"><head>
            <meta charset="utf-8">
            <title>yggr</title>
            <meta http-equiv="refresh" content="0; url=./guide/">
            <link rel="canonical" href="./guide/">
          </head><body>
            <p>Redirecting to <a href="./guide/">the guide</a>. Rustdoc is at <a href="./api/yggr/">api/yggr</a>.</p>
          </body></html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: target/site

  deploy:
    name: deploy
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    # deploy-pages needs id-token: write for OIDC attestation and
    # pages: write to publish. Scope to this job only.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
