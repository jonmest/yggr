syntax = "proto3";

package logos.raft.v1;

message LogId {
  uint64 index = 1;
  uint64 term = 2;
}

message LogEntry {
  LogId id = 1;
  oneof payload {
    Noop noop = 2;
    bytes command = 3;
    ConfigChange config_change = 4;
  }
}

// A leader-emitted no-op entry. Appended at the start of every term so
// prior-term entries can commit safely under §5.4.2.
message Noop {}

// Single-server cluster membership change (§4.3 of the Raft thesis).
message ConfigChange {
  oneof kind {
    NodeIdRef add_peer = 1;
    NodeIdRef remove_peer = 2;
  }
}

// Wrapper around a NodeId so we can keep "id == 0 is invalid" rejection
// consistent with the rest of the wire format.
message NodeIdRef {
  uint64 id = 1;
}

message RequestVote {
  uint64 term = 1;
  uint64 candidate_id = 2;
  LogId last_log_id = 3;
}

message VoteResponse {
  uint64 term = 1;
  VoteResult result = 2;
}

enum VoteResult {
  VOTE_RESULT_UNSPECIFIED = 0;
  VOTE_RESULT_GRANTED = 1;
  VOTE_RESULT_REJECTED = 2;
}

message RequestAppendEntries {
  uint64 term = 1;
  uint64 leader_id = 2;
  LogId prev_log_id = 3;
  repeated LogEntry entries = 4;
  uint64 leader_commit = 5;
}

message AppendEntriesResponse {
  uint64 term = 1;
  oneof result {
    AppendSuccess success = 2;
    AppendConflict conflict = 3;
  }
}

message AppendSuccess {
  // Absent when no entries have been appended yet.
  optional uint64 last_appended = 1;
}

message AppendConflict {
  uint64 next_index_hint = 1;
}

// §7 InstallSnapshot. Sent by a leader to a follower whose nextIndex has
// fallen below the leader's log floor — replication via AppendEntries
// can no longer construct a valid prev_log_id from log entries that
// have been compacted into the snapshot.
message RequestInstallSnapshot {
  uint64 term = 1;
  uint64 leader_id = 2;
  // (index, term) at the snapshot's tail. Receiver replaces all log
  // entries with index ≤ last_included.index.
  LogId last_included = 3;
  // Opaque application snapshot bytes. The receiver hands these to
  // its state machine via Action::ApplySnapshot.
  bytes data = 4;
  // Byte offset this chunk starts at within the logical snapshot
  // stream.
  uint64 offset = 5;
  // True once this chunk reaches the end of the logical snapshot.
  bool done = 6;
  // Same role as in AppendEntries: the leader's commit_index, used
  // by the follower to advance its own commit_index.
  uint64 leader_commit = 7;
  // Cluster membership as of last_included. Snapshot compaction
  // drops the committed ConfigChange entries that established this
  // config; carrying the set here is how the follower restores the
  // right config on install.
  repeated NodeIdRef peers = 8;
}

message InstallSnapshotResponse {
  // Receiver's term. If higher than the leader's, the leader steps
  // down.
  uint64 term = 1;
  // Snapshot tail this acknowledgement refers to.
  LogId last_included = 2;
  // Number of contiguous bytes the follower now holds for
  // last_included. Meaningful only while done == false.
  uint64 next_offset = 3;
  // True once the follower has fully installed a snapshot at
  // last_included.
  bool done = 4;
}

message TimeoutNow {
  uint64 term = 1;
  uint64 leader_id = 2;
}

// §9.6 pre-vote. Same shape as RequestVote, different intent: asking
// whether peers WOULD vote, without actually incrementing any term.
message RequestPreVote {
  uint64 term = 1;
  uint64 candidate_id = 2;
  LogId last_log_id = 3;
}

message PreVoteResponse {
  uint64 term = 1;
  bool granted = 2;
}

message Message {
  oneof kind {
    RequestVote vote_request = 1;
    VoteResponse vote_response = 2;
    RequestAppendEntries append_entries_request = 3;
    AppendEntriesResponse append_entries_response = 4;
    RequestInstallSnapshot install_snapshot_request = 5;
    InstallSnapshotResponse install_snapshot_response = 6;
    TimeoutNow timeout_now = 7;
    RequestPreVote pre_vote_request = 8;
    PreVoteResponse pre_vote_response = 9;
  }
}
